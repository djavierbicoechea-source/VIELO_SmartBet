databases:
  - name: vielodb
    plan: free
    databaseName: vielodb
    user: vielouser

services:
  - type: web
    name: vielo-smartbet
    runtime: docker
    plan: free
    dockerfilePath: ./Dockerfile
    dockerContext: .
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: vielodb
          property: connectionString

      - key: PGUSER
        fromDatabase:
          name: vielodb
          property: user

      - key: PGPASSWORD
        fromDatabase:
          name: vielodb
          property: password
