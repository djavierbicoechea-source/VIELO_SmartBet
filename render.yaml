databases:
  - name: vielodb
    plan: free
    databaseName: vielodb
    user: vielouser

services:
  - type: web
    name: vielo-smartbet
    runtime: docker
    plan: free
    dockerfilePath: ./Dockerfile
    dockerContext: .

    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: vielodb
          property: connectionString

- key: JDBC_DATABASE_URL
  fromDatabase:
    name: vielodb
    property: connectionString


      - key: PGUSER
        fromDatabase:
          name: vielodb
          property: user

      - key: PGPASSWORD
        fromDatabase:
          name: vielodb
          property: password

      - key: SPRING_PROFILES_ACTIVE
        value: prod

      - key: APIFOOTBALL_ENABLED
        value: false

      - key: ODDS_API_ENABLED
        value: false

      - key: STRIPE_ENABLED
        value: false
