<!doctype html>
<html xmlns:th="http://www.thymeleaf.org">
<head th:replace="fragments :: head('Pronostics • VIELO SmartBet')"></head>
<body>
<div th:replace="fragments :: nav"></div>

<div class="container py-4 py-lg-5">
  <div class="d-flex flex-column flex-md-row justify-content-between align-items-md-center gap-2 mb-3">
    <div>
      <span class="pill-label d-inline-flex mb-2">Pronostics aujourd'hui + demain</span>
      <h2 class="fw-bold mb-0">Pronostics</h2>
    </div>
    <div class="muted"><span th:text="${freeCount}"></span> gratuits • <span th:text="${premiumCount}"></span> premium</div>
  </div>

  <div class="mt-3" th:if="${#lists.isEmpty(predictionSections)}">
    <div class="card p-4 empty-state">
      <p class="muted mb-0">Aucun pronostic disponible pour le moment.</p>
    </div>
  </div>

  <div th:if="${!#lists.isEmpty(predictionSections)}">
    <section class="mb-4" th:each="section : ${predictionSections}">
      <div class="d-flex justify-content-between align-items-center mb-3">
        <h4 class="fw-bold mb-0" th:text="${section.date}"></h4>
        <span class="muted small" th:text="${#lists.size(section.predictions)} + ' pronostics'"></span>
      </div>

      <div class="row g-3">
        <div class="col-md-6" th:each="p : ${section.predictions}">
          <div class="feature-card h-100 prediction-card">
            <div class="d-flex justify-content-between gap-3">
              <div>
                <div class="fw-semibold" th:text="${p.matchLabel}"></div>
                <div class="muted small" th:text="${p.league}"></div>
              </div>
              <div class="text-end">
                <span class="badge" th:classappend="${p.free ? 'badge-free' : 'badge-premium'}" th:text="${p.tierLabel}"></span>
                <div class="fw-bold mt-1" th:if="${p.free or premium}" th:text="${p.odd}"></div>
                <div class="fw-bold mt-1" th:if="${p.premium and !premium}">--</div>
              </div>
            </div>

            <div class="mt-3" th:if="${p.free or premium}">
              <div class="fw-semibold" th:text="${p.market}"></div>
              <div class="muted" th:text="${p.pick}"></div>
              <div class="muted small mt-2">Score IA: <span th:text="${p.score}"></span></div>
            </div>

            <div class="mt-3 premium-lock-panel" th:if="${p.premium and !premium}">
              <div class="fw-semibold">🔒 Pronostic premium</div>
              <div class="muted">Abonne-toi pour voir le pari, la cote et le score IA.</div>
              <a class="btn btn-gold btn-sm mt-3" th:href="@{/pricing}">Débloquer Premium</a>
            </div>
          </div>
        </div>
      </div>
    </section>
  </div>
</div>

<div th:replace="fragments :: footer"></div>
</body>
</html>
