<!DOCTYPE html>
<html lang="fr" xmlns:th="http://www.thymeleaf.org">

<!-- HEAD FRAGMENT -->
<head th:fragment="head(title)">
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title th:text="${title} ?: 'VIELO SmartBet'">VIELO SmartBet</title>

    <!-- Bootstrap CSS -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet"/>

    <!-- Ton CSS -->
    <link rel="stylesheet" th:href="@{/css/style.css}">

    <!-- IMPORTANT : Bootstrap JS ici pour mobile menu -->
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js" defer></script>
</head>

<body>

<!-- NAVBAR FRAGMENT -->
<nav th:fragment="navbar" class="navbar navbar-expand-lg navbar-dark bg-dark shadow-sm">
    <div class="container">

        <a class="navbar-brand fw-bold" th:href="@{/}">
            VIELO SmartBet
        </a>

        <!-- Bouton 3 barres mobile -->
        <button class="navbar-toggler" type="button"
                data-bs-toggle="collapse"
                data-bs-target="#mainNavbar"
                aria-controls="mainNavbar"
                aria-expanded="false"
                aria-label="Toggle navigation">

            <span class="navbar-toggler-icon"></span>
        </button>

        <!-- Menu -->
        <div class="collapse navbar-collapse" id="mainNavbar">

            <ul class="navbar-nav me-auto mb-2 mb-lg-0">

                <li class="nav-item">
                    <a class="nav-link" th:href="@{/predictions}">Pronostics</a>
                </li>

                <li class="nav-item">
                    <a class="nav-link" th:href="@{/premium}">Premium</a>
                </li>

                <li class="nav-item">
                    <a class="nav-link" th:href="@{/generator}">Générateur</a>
                </li>

            </ul>

            <!-- Non connecté -->
            <ul class="navbar-nav ms-auto" th:if="${#authorization.expression('isAnonymous()')}">

                <li class="nav-item">
                    <a class="nav-link btn btn-outline-light px-3 me-2"
                       th:href="@{/login}">
                        Login
                    </a>
                </li>

                <li class="nav-item">
                    <a class="nav-link btn btn-success px-3"
                       th:href="@{/register}">
                        Register
                    </a>
                </li>

            </ul>

            <!-- Connecté -->
            <ul class="navbar-nav ms-auto" th:if="${#authorization.expression('isAuthenticated()')}">

                <li class="nav-item">
                    <span class="nav-link text-info"
                          th:text="${#authentication.name}">
                        user@email.com
                    </span>
                </li>

                <li class="nav-item">
                    <a class="nav-link" th:href="@{/dashboard}">
                        Dashboard
                    </a>
                </li>

                <li class="nav-item">
                    <form th:action="@{/logout}" method="post">
                        <button class="btn btn-danger ms-2">
                            Logout
                        </button>
                    </form>
                </li>

            </ul>

        </div>
    </div>
</nav>

<!-- FOOTER -->
<footer th:fragment="footer" class="text-center text-light py-4 mt-5">
    © 2026 VIELO SmartBet
</footer>

</body>
                      </html>
