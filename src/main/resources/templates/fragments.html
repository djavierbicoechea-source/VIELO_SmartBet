<!doctype html>
<html xmlns:th="http://www.thymeleaf.org">
<head th:fragment="head(title)">
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title th:text="${title}">VIELO SmartBet</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
  <link rel="stylesheet" th:href="@{/css/app.css}">
</head>
<body>
<nav th:fragment="nav" class="navbar navbar-expand-lg navbar-dark app-nav sticky-top">
  <div class="container">
    <a class="navbar-brand fw-bold d-flex align-items-center gap-2" th:href="@{/}">
      <span class="brand-mark">V</span>
      <span>VIELO SmartBet</span>
    </a>
    <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#nav">
      <span class="navbar-toggler-icon"></span>
    </button>
    <div class="collapse navbar-collapse" id="nav">
      <ul class="navbar-nav me-auto gap-lg-2">
        <li class="nav-item"><a class="nav-link" th:href="@{/predictions}">Pronostics</a></li>
        <li class="nav-item"><a class="nav-link" th:href="@{/pricing}">Premium</a></li>
        <li class="nav-item" th:if="${loggedIn}"><a class="nav-link" th:href="@{/generator}">Générateur</a></li>
      </ul>
      <ul class="navbar-nav ms-auto align-items-lg-center gap-lg-2">
        <li class="nav-item" th:if="${loggedIn}">
          <span class="nav-link nav-user" th:text="${currentUserEmail}"></span>
        </li>
        <li class="nav-item" th:if="${loggedIn}">
          <a class="nav-link" th:href="@{/dashboard}">Dashboard</a>
        </li>
        <li class="nav-item" th:if="${loggedIn}">
          <form th:action="@{/logout}" method="post" class="d-inline">
            <button type="submit" class="btn btn-nav-ghost">Logout</button>
          </form>
        </li>
        <li class="nav-item" th:if="${!loggedIn}">
          <a class="btn btn-nav-ghost" th:href="@{/login}">Login</a>
        </li>
        <li class="nav-item" th:if="${!loggedIn}">
          <a class="btn btn-accent btn-sm px-3" th:href="@{/register}">Register</a>
        </li>
      </ul>
    </div>
  </div>
</nav>

<footer th:fragment="footer" class="py-4 mt-5 footer-shell">
  <div class="container muted small d-flex flex-column flex-md-row justify-content-between gap-2">
    <div>© <span th:text="${T(java.time.Year).now()}"></span> VIELO SmartBet</div>
    <div>Pronostics football • Free + Premium</div>
  </div>
</footer>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
