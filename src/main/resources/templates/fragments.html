<!DOCTYPE html>
<html lang="fr" xmlns:th="http://www.thymeleaf.org">

<!-- ================= HEAD ================= -->
<head th:fragment="head(title)">
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title th:text="${title} ?: 'VIELO SmartBet'">VIELO SmartBet</title>

    <!-- Bootstrap CSS -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet"/>

    <!-- CSS PRINCIPAL -->
    <link rel="stylesheet" th:href="@{/css/app.css?v=9}">

    <!-- Bootstrap JS -->
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js" defer></script>
</head>

<body>

<!-- ================= NAVBAR ================= -->
<nav th:fragment="navbar" class="navbar navbar-expand-lg app-nav sticky-top">
    <div class="container py-2">

        <!-- Logo -->
        <a class="navbar-brand d-flex align-items-center gap-2 fw-bold"
           th:href="@{/}">

            <span class="brand-mark">V</span>
            <span>VIELO SmartBet</span>
        </a>

        <!-- Bouton mobile -->
        <button class="navbar-toggler border-0 shadow-none"
                type="button"
                data-bs-toggle="collapse"
                data-bs-target="#mainNavbar"
                aria-controls="mainNavbar"
                aria-expanded="false"
                aria-label="Toggle navigation">

            <span class="navbar-toggler-icon"></span>
        </button>

        <!-- Menu -->
        <div class="collapse navbar-collapse mt-3 mt-lg-0" id="mainNavbar">

            <!-- Liens gauche -->
            <ul class="navbar-nav me-auto gap-lg-2">

                <li class="nav-item">
                    <a class="nav-link" th:href="@{/}">
                        Accueil
                    </a>
                </li>

                <li class="nav-item">
                    <a class="nav-link" th:href="@{/predictions}">
                        Pronostics
                    </a>
                </li>

                <li class="nav-item">
                    <a class="nav-link" th:href="@{/premium}">
                        Premium
                    </a>
                </li>

                <li class="nav-item">
                    <a class="nav-link" th:href="@{/generator}">
                        Générateur
                    </a>
                </li>

            </ul>

            <!-- Non connecté -->
            <ul class="navbar-nav ms-auto align-items-lg-center gap-2"
                th:if="${#authorization.expression('isAnonymous()')}">

                <li class="nav-item">
                    <a class="btn btn-nav-ghost"
                       th:href="@{/login}">
                        Login
                    </a>
                </li>

                <li class="nav-item">
                    <a class="btn btn-accent"
                       th:href="@{/register}">
                        Register
                    </a>
                </li>

            </ul>

            <!-- Connecté -->
            <ul class="navbar-nav ms-auto align-items-lg-center gap-2"
                th:if="${#authorization.expression('isAuthenticated()')}">

                <li class="nav-item">
                    <span class="nav-link nav-user text-info"
                          th:text="${#authentication.name}">
                        user@email.com
                    </span>
                </li>

                <li class="nav-item">
                    <a class="btn btn-nav-ghost"
                       th:href="@{/dashboard}">
                        Dashboard
                    </a>
                </li>

                <li class="nav-item">
                    <form th:action="@{/logout}" method="post" class="m-0">
                        <button type="submit" class="btn btn-danger">
                            Logout
                        </button>
                    </form>
                </li>

            </ul>

        </div>
    </div>
</nav>

<!-- ================= FOOTER ================= -->
<footer th:fragment="footer"
        class="footer-shell text-center text-light py-4 mt-5">

    <div class="container">
        © 2026 VIELO SmartBet • Football Predictions • Free + Premium
    </div>

</footer>

</body>
    </html>
