server.port=${PORT:8080}

# DATABASE
spring.datasource.url=jdbc:${DATABASE_URL}
spring.datasource.username=${PGUSER}
spring.datasource.password=${PGPASSWORD}
spring.datasource.driver-class-name=org.postgresql.Driver

spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=false
spring.jpa.open-in-view=false
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.database-platform=org.hibernate.dialect.PostgreSQLDialect

# THYMELEAF
spring.thymeleaf.cache=false

# API FOOTBALL
api.football.key=${APIFOOTBALL_KEY:}
api.football.base-url=https://v3.football.api-sports.io

# ODDS API
odds.api.key=${ODDS_API_KEY:}

# STRIPE
stripe.public.key=${STRIPE_PUBLIC_KEY:}
stripe.secret.key=${STRIPE_SECRET_KEY:}
stripe.webhook.secret=${STRIPE_WEBHOOK_SECRET:}

# OPTIONS
APIFOOTBALL_ENABLED=${APIFOOTBALL_ENABLED:false}
ODDS_API_ENABLED=${ODDS_API_ENABLED:false}
STRIPE_ENABLED=${STRIPE_ENABLED:false}

# LOGS
logging.level.com.vielo=INFO
