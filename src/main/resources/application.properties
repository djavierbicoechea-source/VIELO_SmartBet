server.port=${PORT:8080}

spring.datasource.url=jdbc:postgresql://${PGHOST}:${PGPORT}/${PGDATABASE}
spring.datasource.username=${PGUSER}
spring.datasource.password=${PGPASSWORD}
spring.datasource.driver-class-name=org.postgresql.Driver

spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=false
spring.jpa.open-in-view=false
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.database-platform=org.hibernate.dialect.PostgreSQLDialect

spring.thymeleaf.cache=false

# API-FOOTBALL
vielo.apifootball.enabled=${APIFOOTBALL_ENABLED:true}
vielo.apifootball.key=${APIFOOTBALL_KEY:}
vielo.apifootball.base-url=https://v3.football.api-sports.io
vielo.apifootball.leagues=39,140,61,78,135

# ODDS API
vielo.oddsapi.enabled=${ODDS_API_ENABLED:true}
vielo.oddsapi.key=${ODDS_API_KEY:}
vielo.oddsapi.base-url=https://api.the-odds-api.com
vielo.oddsapi.regions=us,eu
vielo.oddsapi.markets=h2h,totals
vielo.oddsapi.max-kickoff-diff-minutes=180

# STRIPE
vielo.stripe.enabled=${STRIPE_ENABLED:true}
vielo.stripe.public-key=${STRIPE_PUBLIC_KEY:}
vielo.stripe.secret-key=${STRIPE_SECRET_KEY:}
vielo.stripe.webhook-secret=${STRIPE_WEBHOOK_SECRET:}
vielo.stripe.currency=usd
vielo.stripe.success-url=${STRIPE_SUCCESS_URL:https://vielo-smartbet.onrender.com/payment/success}
vielo.stripe.cancel-url=${STRIPE_CANCEL_URL:https://vielo-smartbet.onrender.com/payment/cancel}

vielo.free-tips-per-day=5
vielo.max-predictions-per-day=10
vielo.demo.enabled=false

logging.level.com.vielo=INFO
logging.level.com.vielo.smartbet.football=DEBUG
